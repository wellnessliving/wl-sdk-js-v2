name: Build SDK

on:
  repository_dispatch:
    types: [openapi-updated]
  schedule:
    # Fallback: runs daily at 08:00 UTC in case the dispatch was missed.
    - cron: '0 8 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'

concurrency:
  group: build-sdk
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Clone OpenAPI spec repository
        run: git clone --depth=1 https://github.com/wellnessliving/openapi.git /tmp/openapi-spec

      - name: Generate browser SDK (stable + dev + production if available)
        run: node scripts/generate.js

      - name: Generate TypeScript SDK (stable + dev + production if available)
        run: node scripts/generate-ts.js

      - name: Compile TypeScript to ESM + CJS + d.ts
        run: node scripts/compile.js

      - name: Check for changes
        id: changes
        run: |
          STABLE_VER=$(grep -m1 'Spec version:' stable/wl-sdk.js | awk '{print $NF}')
          DEV_VER=$(grep -m1 'Spec version:' dev/wl-sdk.js | awk '{print $NF}')
          echo "stable_ver=${STABLE_VER}" >> $GITHUB_OUTPUT
          echo "dev_ver=${DEV_VER}" >> $GITHUB_OUTPUT
          echo "method_count=$(grep -m1 'Endpoints:' stable/wl-sdk.js | awk '{print $NF}')" >> $GITHUB_OUTPUT
          if [ -f production/wl-sdk.js ]; then
            PROD_VER=$(grep -m1 'Spec version:' production/wl-sdk.js | awk '{print $NF}')
            echo "prod_ver=${PROD_VER}" >> $GITHUB_OUTPUT
            echo "has_production=true" >> $GITHUB_OUTPUT
            ROOT_VER="$PROD_VER"
          else
            echo "prod_ver=" >> $GITHUB_OUTPUT
            echo "has_production=false" >> $GITHUB_OUTPUT
            ROOT_VER="$STABLE_VER"
          fi

          CURRENT_VER=$(node -e "console.log(require('./package.json').version)")
          if [ "$ROOT_VER" != "$CURRENT_VER" ] || [ ! -f wl-sdk.js ]; then
            echo "main_changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected: root ${CURRENT_VER} -> ${ROOT_VER}"
          else
            echo "main_changed=false" >> $GITHUB_OUTPUT
            echo "No changes to main root - SDK is up to date."
          fi

      - name: Update root SDK files and package.json version
        if: steps.changes.outputs.main_changed == 'true'
        run: |
          HAS_PROD="${{ steps.changes.outputs.has_production }}"
          PROD_VER="${{ steps.changes.outputs.prod_ver }}"
          STABLE_VER="${{ steps.changes.outputs.stable_ver }}"

          if [ "$HAS_PROD" = "true" ]; then
            SRC_DIR="production"
            PKG_VER="$PROD_VER"
          else
            SRC_DIR="stable"
            PKG_VER="$STABLE_VER"
          fi
          cp "${SRC_DIR}/wl-sdk.js" ./wl-sdk.js
          cp "${SRC_DIR}/wl-sdk.esm.js" ./wl-sdk.esm.js
          cp "${SRC_DIR}/wl-sdk.cjs.js" ./wl-sdk.cjs.js
          cp "${SRC_DIR}/wl-sdk.d.ts" ./wl-sdk.d.ts

          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = process.argv[1];
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          " "$PKG_VER"
          git add wl-sdk.js wl-sdk.esm.js wl-sdk.cjs.js wl-sdk.d.ts package.json

      - name: Commit and push main
        if: steps.changes.outputs.main_changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          STABLE_VER="${{ steps.changes.outputs.stable_ver }}"
          DEV_VER="${{ steps.changes.outputs.dev_ver }}"
          PROD_VER="${{ steps.changes.outputs.prod_ver }}"
          if [ -n "$PROD_VER" ]; then
            MSG=$(printf 'chore: regenerate SDK from OpenAPI spec\n\nstable: %s\ndev: %s\nproduction: %s' "$STABLE_VER" "$DEV_VER" "$PROD_VER")
          else
            MSG=$(printf 'chore: regenerate SDK from OpenAPI spec\n\nstable: %s\ndev: %s' "$STABLE_VER" "$DEV_VER")
          fi
          git commit -m "$MSG"
          git pull --rebase origin main
          git push

      - name: Push stable branch
        run: |
          STABLE_VER="${{ steps.changes.outputs.stable_ver }}"
          WORKSPACE="${{ github.workspace }}"
          TOKEN="${{ github.token }}"
          REPO="${{ github.repository }}"

          node -e "
            const pkg = {
              name: '@wellnessliving/sdk',
              version: process.argv[1],
              description: 'WellnessLiving JavaScript/TypeScript SDK - auto-generated from OpenAPI spec',
              main: 'wl-sdk.cjs.js',
              module: 'wl-sdk.esm.js',
              browser: 'wl-sdk.js',
              types: 'wl-sdk.d.ts',
              engines: { node: '>=18.0.0' }
            };
            require('fs').writeFileSync('/tmp/pkg-stable.json', JSON.stringify(pkg, null, 2) + '\n');
          " "$STABLE_VER"

          mkdir -p /tmp/sdk-stable
          cd /tmp/sdk-stable
          git init
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git remote add origin "https://x-access-token:${TOKEN}@github.com/${REPO}"
          if git fetch origin stable --depth=1 2>/dev/null; then
            git checkout stable
          else
            git checkout --orphan stable
          fi
          git rm -rf . --quiet 2>/dev/null || true

          cp "${WORKSPACE}/stable/wl-sdk.js" .
          cp "${WORKSPACE}/stable/wl-sdk.esm.js" .
          cp "${WORKSPACE}/stable/wl-sdk.cjs.js" .
          cp "${WORKSPACE}/stable/wl-sdk.d.ts" .
          cp /tmp/pkg-stable.json ./package.json

          git add .
          git diff --staged --quiet || git commit -m "stable: ${STABLE_VER}"
          git push origin HEAD:stable

      - name: Push dev branch
        run: |
          DEV_VER="${{ steps.changes.outputs.dev_ver }}"
          WORKSPACE="${{ github.workspace }}"
          TOKEN="${{ github.token }}"
          REPO="${{ github.repository }}"

          node -e "
            const pkg = {
              name: '@wellnessliving/sdk',
              version: process.argv[1],
              description: 'WellnessLiving JavaScript/TypeScript SDK - auto-generated from OpenAPI spec',
              main: 'wl-sdk.cjs.js',
              module: 'wl-sdk.esm.js',
              browser: 'wl-sdk.js',
              types: 'wl-sdk.d.ts',
              engines: { node: '>=18.0.0' }
            };
            require('fs').writeFileSync('/tmp/pkg-dev.json', JSON.stringify(pkg, null, 2) + '\n');
          " "$DEV_VER"

          mkdir -p /tmp/sdk-dev
          cd /tmp/sdk-dev
          git init
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git remote add origin "https://x-access-token:${TOKEN}@github.com/${REPO}"
          if git fetch origin dev --depth=1 2>/dev/null; then
            git checkout dev
          else
            git checkout --orphan dev
          fi
          git rm -rf . --quiet 2>/dev/null || true

          cp "${WORKSPACE}/dev/wl-sdk.js" .
          cp "${WORKSPACE}/dev/wl-sdk.esm.js" .
          cp "${WORKSPACE}/dev/wl-sdk.cjs.js" .
          cp "${WORKSPACE}/dev/wl-sdk.d.ts" .
          cp /tmp/pkg-dev.json ./package.json

          git add .
          git diff --staged --quiet || git commit -m "dev: ${DEV_VER}"
          git push origin HEAD:dev

      - name: Create GitHub Release
        if: steps.changes.outputs.main_changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v${{ steps.changes.outputs.stable_ver }}"
          STABLE_VER="${{ steps.changes.outputs.stable_ver }}"
          DEV_VER="${{ steps.changes.outputs.dev_ver }}"
          PROD_VER="${{ steps.changes.outputs.prod_ver }}"
          METHOD_COUNT="${{ steps.changes.outputs.method_count }}"
          HAS_PROD="${{ steps.changes.outputs.has_production }}"

          if gh release view "$TAG" > /dev/null 2>&1; then
            echo "Release $TAG already exists - skipping."
            exit 0
          fi

          if [ "$HAS_PROD" = "true" ]; then
            PROD_ROW="| Production spec | \`${PROD_VER}\` |"
          else
            PROD_ROW=""
          fi

          printf '## WellnessLiving JavaScript SDK %s\n\n| | |\n|---|---|\n| Stable spec | `%s` |\n| Dev spec | `%s` |\n%s\n| Endpoints | %s |\n\n## Install\n\n```bash\n# Production / default\nnpm install github:wellnessliving/wl-openapi-js\n\n# Stable\nnpm install github:wellnessliving/wl-openapi-js#stable\n\n# Dev\nnpm install github:wellnessliving/wl-openapi-js#dev\n```\n\n## CDN links (jsDelivr)\n\n```html\n<!-- Stable (browser UMD) -->\n<script src="https://cdn.jsdelivr.net/gh/wellnessliving/wl-openapi-js@stable/wl-sdk.js"></script>\n\n<!-- Dev (browser UMD) -->\n<script src="https://cdn.jsdelivr.net/gh/wellnessliving/wl-openapi-js@dev/wl-sdk.js"></script>\n```\n\n---\nAuto-generated from [wellnessliving/openapi](https://github.com/wellnessliving/openapi).\n' \
            "$TAG" "$STABLE_VER" "$DEV_VER" "$PROD_ROW" "$METHOD_COUNT" > /tmp/release-notes.md

          cp stable/wl-sdk.js /tmp/wl-sdk-stable.js
          cp dev/wl-sdk.js /tmp/wl-sdk-dev.js
          cp stable/wl-sdk.esm.js /tmp/wl-sdk-stable.esm.js
          cp dev/wl-sdk.esm.js /tmp/wl-sdk-dev.esm.js
          cp stable/wl-sdk.cjs.js /tmp/wl-sdk-stable.cjs.js
          cp dev/wl-sdk.cjs.js /tmp/wl-sdk-dev.cjs.js
          cp stable/wl-sdk.d.ts /tmp/wl-sdk-stable.d.ts
          cp dev/wl-sdk.d.ts /tmp/wl-sdk-dev.d.ts

          EXTRA_ASSETS=""
          if [ "$HAS_PROD" = "true" ]; then
            cp production/wl-sdk.js /tmp/wl-sdk-production.js
            cp production/wl-sdk.esm.js /tmp/wl-sdk-production.esm.js
            cp production/wl-sdk.cjs.js /tmp/wl-sdk-production.cjs.js
            cp production/wl-sdk.d.ts /tmp/wl-sdk-production.d.ts
            EXTRA_ASSETS="/tmp/wl-sdk-production.js /tmp/wl-sdk-production.esm.js /tmp/wl-sdk-production.cjs.js /tmp/wl-sdk-production.d.ts"
          fi

          gh release create "$TAG" \
            /tmp/wl-sdk-stable.js \
            /tmp/wl-sdk-dev.js \
            /tmp/wl-sdk-stable.esm.js \
            /tmp/wl-sdk-dev.esm.js \
            /tmp/wl-sdk-stable.cjs.js \
            /tmp/wl-sdk-dev.cjs.js \
            /tmp/wl-sdk-stable.d.ts \
            /tmp/wl-sdk-dev.d.ts \
            $EXTRA_ASSETS \
            --title "SDK ${TAG}" \
            --notes-file /tmp/release-notes.md
